
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
h2.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

.app { padding: 1rem 0; }
.tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; border-bottom: 0.5px solid var(--color-border-tertiary); padding-bottom: 0; }
.tab { padding: 8px 16px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--color-text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: var(--color-text-primary); border-bottom: 2px solid var(--color-text-primary); }

.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
.stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 16px; }
.stat-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.stat-num { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }

.add-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; font-size: 14px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: none; color: var(--color-text-primary); margin-bottom: 1rem; }
.add-btn:hover { background: var(--color-background-secondary); }

.item-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
.item-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
.item-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.item-meta { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: var(--border-radius-md); }
.badge-reading { background: #E6F1FB; color: #0C447C; }
.badge-done { background: #EAF3DE; color: #27500A; }
.badge-queued { background: #F1EFE8; color: #444441; }
.badge-progress { background: #FAEEDA; color: #633806; }

.progress-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.progress-bar { flex: 1; height: 4px; background: var(--color-background-secondary); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; background: var(--color-text-primary); transition: width 0.3s; }
.progress-text { font-size: 12px; color: var(--color-text-secondary); min-width: 36px; text-align: right; }

.item-actions { display: flex; gap: 8px; margin-top: 10px; }
.action-btn { font-size: 12px; padding: 4px 10px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); cursor: pointer; background: none; color: var(--color-text-secondary); }
.action-btn:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
.action-btn.danger:hover { color: #A32D2D; border-color: #F09595; }

.note-text { font-size: 13px; color: var(--color-text-secondary); margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--color-border-tertiary); font-style: italic; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 1.5rem; width: 100%; max-width: 420px; }
.modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; color: var(--color-text-primary); }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px; }
.field input, .field select, .field textarea { width: 100%; padding: 8px 10px; font-size: 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-family: var(--font-sans); }
.field textarea { resize: vertical; min-height: 60px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }
.btn-primary { padding: 8px 18px; font-size: 14px; font-weight: 500; border: 0.5px solid var(--color-border-primary); border-radius: var(--border-radius-md); cursor: pointer; background: var(--color-text-primary); color: var(--color-background-primary); }
.btn-cancel { padding: 8px 18px; font-size: 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); cursor: pointer; background: none; color: var(--color-text-secondary); }

.empty { text-align: center; padding: 2.5rem; color: var(--color-text-secondary); font-size: 14px; }

.section { display: none; }
.section.active { display: block; }
</style>

<h2 class="sr-only">مسیر آموزشی محمدرضا اشرفی — پیگیری کتاب‌ها، مقالات و دوره‌ها</h2>

<div class="app">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('books')">کتاب‌ها</button>
    <button class="tab" onclick="switchTab('articles')">مقالات</button>
    <button class="tab" onclick="switchTab('courses')">دوره‌ها</button>
  </div>

  <div id="books" class="section active"></div>
  <div id="articles" class="section"></div>
  <div id="courses" class="section"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">افزودن آیتم</h3>
    <div id="modal-fields"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">انصراف</button>
      <button class="btn-primary" onclick="saveItem()">ذخیره</button>
    </div>
  </div>
</div>

<script>
const KEY = 'mra_learning_v1';
let data = { books: [], articles: [], courses: [] };
let currentTab = 'books';
let editingId = null;

async function load() {
  try {
    const r = await window.storage.get(KEY);
    if (r && r.value) data = JSON.parse(r.value);
  } catch(e) {}
  render();
}

async function save() {
  try { await window.storage.set(KEY, JSON.stringify(data)); } catch(e) {}
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['books','articles','courses'][i] === tab);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  render();
}

function statusBadge(s) {
  const map = { reading: ['در حال خواندن','badge-reading'], done: ['تمام شده','badge-done'], queued: ['در صف','badge-queued'], progress: ['در حال انجام','badge-progress'], completed: ['تمام شده','badge-done'] };
  const [label, cls] = map[s] || ['—','badge-queued'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function renderBooks() {
  const items = data.books;
  const done = items.filter(i=>i.status==='done').length;
  const reading = items.filter(i=>i.status==='reading').length;
  return `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">کل کتاب‌ها</div><div class="stat-num">${items.length}</div></div>
      <div class="stat-card"><div class="stat-label">در حال خواندن</div><div class="stat-num">${reading}</div></div>
      <div class="stat-card"><div class="stat-label">تمام شده</div><div class="stat-num">${done}</div></div>
    </div>
    <button class="add-btn" onclick="openModal('books')">+ افزودن کتاب</button>
    ${items.length === 0 ? '<div class="empty">هنوز کتابی اضافه نشده</div>' : items.map(item => `
      <div class="item-card">
        <div class="item-header">
          <div>
            <div class="item-title">${item.title}</div>
            <div class="item-meta">${item.author || ''}${item.author && item.lang ? ' · ' : ''}${item.lang || ''}</div>
          </div>
          ${statusBadge(item.status)}
        </div>
        ${item.status === 'reading' ? `
          <div class="progress-row">
            <div class="progress-bar"><div class="progress-fill" style="width:${item.progress||0}%"></div></div>
            <span class="progress-text">${item.progress||0}%</span>
          </div>` : ''}
        ${item.note ? `<div class="note-text">${item.note}</div>` : ''}
        <div class="item-actions">
          <button class="action-btn" onclick="openModal('books','${item.id}')">ویرایش</button>
          <button class="action-btn danger" onclick="deleteItem('books','${item.id}')">حذف</button>
        </div>
      </div>`).join('')}`;
}

function renderArticles() {
  const items = data.articles;
  const done = items.filter(i=>i.status==='done').length;
  return `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">کل مقالات</div><div class="stat-num">${items.length}</div></div>
      <div class="stat-card"><div class="stat-label">خوانده شده</div><div class="stat-num">${done}</div></div>
      <div class="stat-card"><div class="stat-label">در صف</div><div class="stat-num">${items.length - done}</div></div>
    </div>
    <button class="add-btn" onclick="openModal('articles')">+ افزودن مقاله</button>
    ${items.length === 0 ? '<div class="empty">هنوز مقاله‌ای اضافه نشده</div>' : items.map(item => `
      <div class="item-card">
        <div class="item-header">
          <div>
            <div class="item-title">${item.title}</div>
            <div class="item-meta">${item.source || ''}${item.source && item.topic ? ' · ' : ''}${item.topic || ''}</div>
          </div>
          ${statusBadge(item.status)}
        </div>
        ${item.note ? `<div class="note-text">${item.note}</div>` : ''}
        <div class="item-actions">
          <button class="action-btn" onclick="openModal('articles','${item.id}')">ویرایش</button>
          ${item.url ? `<button class="action-btn" onclick="openLink('${item.url}')">باز کردن</button>` : ''}
          <button class="action-btn danger" onclick="deleteItem('articles','${item.id}')">حذف</button>
        </div>
      </div>`).join('')}`;
}

function renderCourses() {
  const items = data.courses;
  const done = items.filter(i=>i.status==='completed').length;
  const inprog = items.filter(i=>i.status==='progress').length;
  return `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">کل دوره‌ها</div><div class="stat-num">${items.length}</div></div>
      <div class="stat-card"><div class="stat-label">در حال انجام</div><div class="stat-num">${inprog}</div></div>
      <div class="stat-card"><div class="stat-label">تمام شده</div><div class="stat-num">${done}</div></div>
    </div>
    <button class="add-btn" onclick="openModal('courses')">+ افزودن دوره</button>
    ${items.length === 0 ? '<div class="empty">هنوز دوره‌ای اضافه نشده</div>' : items.map(item => `
      <div class="item-card">
        <div class="item-header">
          <div>
            <div class="item-title">${item.title}</div>
            <div class="item-meta">${item.platform || ''}${item.platform && item.cert ? ' · ' : ''}${item.cert ? 'دارای مدرک' : ''}</div>
          </div>
          ${statusBadge(item.status)}
        </div>
        ${item.status === 'progress' ? `
          <div class="progress-row">
            <div class="progress-bar"><div class="progress-fill" style="width:${item.progress||0}%"></div></div>
            <span class="progress-text">${item.progress||0}%</span>
          </div>` : ''}
        ${item.note ? `<div class="note-text">${item.note}</div>` : ''}
        <div class="item-actions">
          <button class="action-btn" onclick="openModal('courses','${item.id}')">ویرایش</button>
          <button class="action-btn danger" onclick="deleteItem('courses','${item.id}')">حذف</button>
        </div>
      </div>`).join('')}`;
}

function render() {
  if (currentTab === 'books') document.getElementById('books').innerHTML = renderBooks();
  else if (currentTab === 'articles') document.getElementById('articles').innerHTML = renderArticles();
  else document.getElementById('courses').innerHTML = renderCourses();
}

function openModal(type, id) {
  editingId = id || null;
  const item = id ? data[type].find(i=>i.id===id) : null;
  document.getElementById('modal-title').textContent = id ? 'ویرایش' : 'افزودن';

  let fields = '';
  if (type === 'books') {
    fields = `
      <div class="field"><label>عنوان کتاب *</label><input id="f-title" value="${item?.title||''}" placeholder="نام کتاب"></div>
      <div class="field"><label>نویسنده</label><input id="f-author" value="${item?.author||''}" placeholder="نویسنده"></div>
      <div class="field"><label>زبان</label><select id="f-lang"><option value="فارسی" ${item?.lang==='فارسی'?'selected':''}>فارسی</option><option value="انگلیسی" ${item?.lang==='انگلیسی'?'selected':''}>انگلیسی</option></select></div>
      <div class="field"><label>وضعیت</label><select id="f-status"><option value="queued" ${item?.status==='queued'?'selected':''}>در صف</option><option value="reading" ${item?.status==='reading'?'selected':''}>در حال خواندن</option><option value="done" ${item?.status==='done'?'selected':''}>تمام شده</option></select></div>
      <div class="field"><label>پیشرفت (٪)</label><input id="f-progress" type="number" min="0" max="100" value="${item?.progress||0}"></div>
      <div class="field"><label>یادداشت / insight</label><textarea id="f-note">${item?.note||''}</textarea></div>`;
  } else if (type === 'articles') {
    fields = `
      <div class="field"><label>عنوان مقاله *</label><input id="f-title" value="${item?.title||''}" placeholder="عنوان مقاله"></div>
      <div class="field"><label>منبع</label><input id="f-source" value="${item?.source||''}" placeholder="مثلاً Harvard Business Review"></div>
      <div class="field"><label>موضوع</label><input id="f-topic" value="${item?.topic||''}" placeholder="مثلاً brand strategy"></div>
      <div class="field"><label>لینک</label><input id="f-url" value="${item?.url||''}" placeholder="https://..."></div>
      <div class="field"><label>وضعیت</label><select id="f-status"><option value="queued" ${item?.status==='queued'?'selected':''}>در صف</option><option value="done" ${item?.status==='done'?'selected':''}>خوانده شده</option></select></div>
      <div class="field"><label>یادداشت / insight</label><textarea id="f-note">${item?.note||''}</textarea></div>`;
  } else {
    fields = `
      <div class="field"><label>نام دوره *</label><input id="f-title" value="${item?.title||''}" placeholder="نام دوره"></div>
      <div class="field"><label>پلتفرم</label><input id="f-platform" value="${item?.platform||''}" placeholder="مثلاً Google, Coursera"></div>
      <div class="field"><label>دارای مدرک؟</label><select id="f-cert"><option value="" ${!item?.cert?'selected':''}>خیر</option><option value="yes" ${item?.cert?'selected':''}>بله</option></select></div>
      <div class="field"><label>وضعیت</label><select id="f-status"><option value="queued" ${item?.status==='queued'?'selected':''}>در صف</option><option value="progress" ${item?.status==='progress'?'selected':''}>در حال انجام</option><option value="completed" ${item?.status==='completed'?'selected':''}>تمام شده</option></select></div>
      <div class="field"><label>پیشرفت (٪)</label><input id="f-progress" type="number" min="0" max="100" value="${item?.progress||0}"></div>
      <div class="field"><label>یادداشت</label><textarea id="f-note">${item?.note||''}</textarea></div>`;
  }

  document.getElementById('modal-fields').innerHTML = fields;
  document.getElementById('modal').dataset.type = type;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

function saveItem() {
  const type = document.getElementById('modal').dataset.type;
  const title = document.getElementById('f-title')?.value?.trim();
  if (!title) return;

  const base = { id: editingId || uid(), title };

  if (type === 'books') {
    Object.assign(base, {
      author: document.getElementById('f-author')?.value || '',
      lang: document.getElementById('f-lang')?.value || 'فارسی',
      status: document.getElementById('f-status')?.value || 'queued',
      progress: parseInt(document.getElementById('f-progress')?.value) || 0,
      note: document.getElementById('f-note')?.value || ''
    });
  } else if (type === 'articles') {
    Object.assign(base, {
      source: document.getElementById('f-source')?.value || '',
      topic: document.getElementById('f-topic')?.value || '',
      url: document.getElementById('f-url')?.value || '',
      status: document.getElementById('f-status')?.value || 'queued',
      note: document.getElementById('f-note')?.value || ''
    });
  } else {
    Object.assign(base, {
      platform: document.getElementById('f-platform')?.value || '',
      cert: document.getElementById('f-cert')?.value === 'yes',
      status: document.getElementById('f-status')?.value || 'queued',
      progress: parseInt(document.getElementById('f-progress')?.value) || 0,
      note: document.getElementById('f-note')?.value || ''
    });
  }

  if (editingId) {
    const idx = data[type].findIndex(i=>i.id===editingId);
    if (idx !== -1) data[type][idx] = base;
  } else {
    data[type].push(base);
  }

  save();
  closeModal();
  render();
}

function deleteItem(type, id) {
  data[type] = data[type].filter(i=>i.id!==id);
  save();
  render();
}

load();
</script>
