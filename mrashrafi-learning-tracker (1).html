let cur='books',eId=null,eType=null;

function load(){
  try{const r=localStorage.getItem(KEY);data=r?{...SEED,...JSON.parse(r)}:JSON.parse(JSON.stringify(SEED));if(!r)localStorage.setItem(KEY,JSON.stringify(data));}catch(e){data=JSON.parse(JSON.stringify(SEED));}
  const d=new Date();const ms=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];const ds=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('today-date').textContent=`${ds[d.getDay()]}, ${ms[d.getMonth()]} ${d.getDate()}`;
  render();
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

function sw(tab){
  cur=tab;
  document.querySelectorAll('.nav-item').forEach((el,i)=>el.classList.toggle('active',['books','articles','courses','lang','content','brand','schedule','settings'][i]===tab));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  if(tab==='brand')rBrand();if(tab==='schedule')rSched();if(tab==='settings')rSet();
}

function bdg(s){const m={reading:['Reading','b-reading'],done:['Done','b-done'],queued:['Queued','b-queued'],progress:['In Progress','b-progress'],completed:['Completed','b-completed'],active:['Active','b-active']};const[l,c]=m[s]||['—','b-queued'];return`<span class="badge ${c}">${l}</span>`;}

function upd(){['books','articles','courses','lang','content'].forEach(t=>{const n=data[t]?.length||0;const e=document.getElementById('nc-'+t),s=document.getElementById('stat-'+t);if(e)e.textContent=n;if(s)s.textContent=n;});}

function rSec(type){
  const ico={books:'📖',articles:'📝',courses:'🎯',lang:'🗣️',content:'🔗'};
  const lbl={books:'Book',articles:'Article',courses:'Course',lang:'Language Resource',content:'Resource'};
  const emp={books:'📚',articles:'📄',courses:'🎓',lang:'🌍',content:'🔗'};
  const items=data[type]||[];let html=`<button class="add-btn" onclick="openMod('${type}')">+ Add ${lbl[type]}</button>`;
  if(!items.length){html+=`<div class="empty"><div class="empty-icon">${emp[type]}</div><div class="empty-text">Nothing here yet</div></div>`;}
  else items.forEach(item=>{
    let sub='',meta='',sp=false,prog=0,url='';
    if(type==='books'){sub=[item.author,item.lang].filter(Boolean).join(' · ');meta=item.lang||'';sp=item.status==='reading';prog=item.progress||0;if(item.status==='done')prog=100;}
    else if(type==='articles'){sub=[item.source,item.topic].filter(Boolean).join(' · ');meta=item.source||'';url=item.url||'';}
    else if(type==='courses'){sub=[item.platform,item.cert?'Certificate':null].filter(Boolean).join(' · ');meta=item.platform||'';sp=item.status==='progress';prog=item.progress||0;}
    else if(type==='lang'){sub=[item.skill,item.level].filter(Boolean).join(' · ');meta=item.skill||'';url=item.url||'';}
    else if(type==='content'){sub=[item.category,item.platform].filter(Boolean).join(' · ');meta=item.category||'';url=item.url||'';}
    const ph=(sp||(type==='books'&&item.status==='done'))?`<div class="prog-wrap"><div class="prog-row"><span class="prog-pct">${prog}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${prog}%"></div></div></div>`:'';
    const nh=item.note?`<div class="card-note">${item.note}</div>`:'';
    const lb=url?`<button class="act-btn lnk" onclick="ol('${url}')">Open ↗</button>`:'';
    html+=`<div class="card"><div class="card-top"><div class="card-icon">${ico[type]}</div><div class="card-body"><div class="card-title">${item.title}</div><div class="card-sub">${sub}</div></div><div class="card-badge-wrap">${bdg(item.status)}</div></div>${ph}${nh}<div class="card-footer"><span class="card-meta">${meta}</span><div class="card-actions">${lb}<button class="act-btn" onclick="openMod('${type}','${item.id}')">Edit</button><button class="act-btn del" onclick="del('${type}','${item.id}')">Delete</button></div></div></div>`;
  });
  document.getElementById(type).innerHTML=html;
}

function rSched(){
  const d=new Date();const isCls=[0,2,4].includes(d.getDay());
  const reg=[{dot:'#c8a96e',l:'Book Reading',d:'This Is Marketing — current book',t:'60 min'},{dot:'#60a5fa',l:'Reading Resources',d:'Seth Godin, Motamem, Marketing Week',t:'30 min'},{dot:'#4ade80',l:'Personal Brand',d:'LinkedIn content, writing, blog',t:'60 min'}];
  const cls=[{dot:'#a78bfa',l:'Language Class',d:'American English File — online',t:'60–90 min'},{dot:'#c8a96e',l:'Book Reading',d:'This Is Marketing — current book',t:'30 min'},{dot:'#60a5fa',l:'Reading Resources',d:'Seth Godin, Motamem, Marketing Week',t:'30 min'},{dot:'#4ade80',l:'Personal Brand',d:'LinkedIn content, writing, blog',t:'60 min'}];
  function bk(title,items,today){return`<div class="schedule-block"><div class="sch-header"><div class="sch-title">${title}</div>${today?'<div class="sch-badge">Today</div>':''}</div>${items.map(i=>`<div class="sch-row"><div class="sch-dot" style="background:${i.dot}"></div><div class="sch-info"><div class="sch-label">${i.l}</div><div class="sch-desc">${i.d}</div></div><div class="sch-dur">${i.t}</div></div>`).join('')}</div>`;}
  document.getElementById('schedule').innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;font-weight:500">Daily Total</div><div style="font-size:11px;color:var(--text3);margin-top:2px">2.5 hours — consistent, every day</div></div><div style="font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--gold)">2.5h</div></div>${bk('Regular Days — Sat, Mon, Wed, Fri',reg,!isCls)}${bk('Class Days — Sun, Tue, Thu',cls,isCls)}`;
}

function rBrand(){
  const gs=[{t:'Content Creation',items:[{i:'✍️',t:'LinkedIn Post',d:'3 posts/week — story, insight, or real experience',f:'3× / week'},{i:'📝',t:'Blog Article',d:'800–1500 words on mrashrafi.com',f:'Monthly'},{i:'🔁',t:'Re-share with Analysis',d:'Industry content with your own POV',f:'Weekly'}]},{t:'Authority Building',items:[{i:'💬',t:'Engage on Others\' Posts',d:'Expert comments on thought leaders in your field',f:'5× / week'},{i:'🤝',t:'New Connections',d:'5–10 targeted: marketers, CMOs, agency leads',f:'Weekly'},{i:'📊',t:'Analytics Review',d:'What performed? What topic drove engagement?',f:'Weekly'}]},{t:'Long-term Growth',items:[{i:'🎙️',t:'Podcast Guest',d:'Iranian marketing podcasts — build local credibility first',f:'Monthly'},{i:'📰',t:'Write for Trade Press',d:'Digikala Mag or Iranian marketing media',f:'Monthly'},{i:'🔍',t:'Personal Brand Audit',d:'Is your positioning landing? Get feedback.',f:'Monthly'}]},{t:'Infrastructure — One Time',items:[{i:'🌐',t:'Launch mrashrafi.com',d:'Design with new positioning — About, Blog, Contact',f:'Once'},{i:'🖼️',t:'Update LinkedIn Profile',d:'Headline, About, Featured — new positioning',f:'Once'},{i:'📸',t:'Professional Photo',d:'Profile photo & LinkedIn banner — consistent',f:'Once'}]}];
  document.getElementById('brand').innerHTML=gs.map(g=>`<div class="brand-group"><div class="brand-group-title">${g.t}</div>${g.items.map(i=>`<div class="brand-row"><div class="brand-row-icon">${i.i}</div><div class="brand-row-body"><div class="brand-row-title">${i.t}</div><div class="brand-row-desc">${i.d}</div><span class="freq-tag">${i.f}</span></div></div>`).join('')}</div>`).join('');
}

function rSet(){
  const tot=Object.values(data).reduce((s,a)=>s+(a?.length||0),0);
  const done=(data.books||[]).filter(i=>i.status==='done').length+(data.courses||[]).filter(i=>i.status==='completed').length+(data.articles||[]).filter(i=>i.status==='done').length+(data.lang||[]).filter(i=>i.status==='done').length;
  const kb=Math.round(JSON.stringify(data).length/1024*10)/10;
  document.getElementById('settings').innerHTML=`<div class="set-block"><div class="set-title">Overview</div><div class="stats-grid"><div class="stat-mini"><span class="stat-mini-label">Total Items</span><span class="stat-mini-val">${tot}</span></div><div class="stat-mini"><span class="stat-mini-label">Completed</span><span class="stat-mini-val">${done}</span></div><div class="stat-mini"><span class="stat-mini-label">Books</span><span class="stat-mini-val">${(data.books||[]).length}</span></div><div class="stat-mini"><span class="stat-mini-label">Courses</span><span class="stat-mini-val">${(data.courses||[]).length}</span></div><div class="stat-mini"><span class="stat-mini-label">Resources</span><span class="stat-mini-val">${(data.content||[]).length}</span></div><div class="stat-mini"><span class="stat-mini-label">Data Size</span><span class="stat-mini-val">${kb}KB</span></div></div></div><div class="set-block"><div class="set-title">Export</div><div class="set-row"><div><div class="set-label">Download JSON</div><div class="set-desc">Download all data as a backup file</div></div><button class="set-btn primary" onclick="expJ()">Download JSON</button></div><div class="set-row"><div><div class="set-label">Copy to Clipboard</div><div class="set-desc">Quick backup</div></div><button class="set-btn" onclick="cpJ()">Copy JSON</button></div></div><div class="set-block"><div class="set-title">Import</div><div class="set-row"><div><div class="set-label">Load from JSON</div><div class="set-desc">Restore from a backup file</div></div><button class="set-btn" onclick="document.getElementById('file-input').click()">Choose File</button></div></div><div class="set-block"><div class="set-title">Danger Zone</div><div class="set-row"><div><div class="set-label">Reset All Data</div><div class="set-desc">Restore original seed data</div></div><button class="set-btn danger" onclick="rst()">Reset</button></div></div>`;
}

function expJ(){const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`mrashrafi-learning-${new Date().toISOString().slice(0,10)}.json`;a.click();toast('Downloaded ✓');}
function cpJ(){navigator.clipboard.writeText(JSON.stringify(data,null,2)).then(()=>toast('Copied ✓')).catch(()=>toast('Failed'));}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const imp=JSON.parse(ev.target.result);if(typeof imp==='object'&&imp!==null){if(confirm('Replace current data?')){data={books:[],articles:[],courses:[],lang:[],content:[],...imp};save();render();toast('Imported ✓');}}else toast('Invalid file');}catch{toast('Error reading file');}e.target.value='';};r.readAsText(f);}
function rst(){if(confirm('Reset to original data?')){data=JSON.parse(JSON.stringify(SEED));save();render();toast('Reset ✓');}}

function openMod(type,id){
  eId=id||null;eType=type;
  const item=id?data[type]?.find(i=>i.id===id):null;
  const tls={books:'Book',articles:'Article',courses:'Course',lang:'Language Resource',content:'Resource'};
  document.getElementById('mtitle').textContent=(id?'Edit ':'Add ')+tls[type];
  let f='';
  if(type==='books'){f=`<div class="field"><label>Title</label><input id="f-title" value="${item?.title||''}" placeholder="Book title"></div><div class="field-row"><div class="field"><label>Author</label><input id="f-author" value="${item?.author||''}" placeholder="Author"></div><div class="field"><label>Language</label><select id="f-lang"><option value="Persian" ${!item?.lang||item?.lang==='Persian'?'selected':''}>Persian</option><option value="English" ${item?.lang==='English'?'selected':''}>English</option></select></div></div><div class="field"><label>Status</label><select id="f-status"><option value="queued" ${!item?.status||item?.status==='queued'?'selected':''}>Queued</option><option value="reading" ${item?.status==='reading'?'selected':''}>Reading</option><option value="done" ${item?.status==='done'?'selected':''}>Done</option></select></div><div class="field"><label>Progress</label><div class="range-wrap"><input type="range" id="f-progress" min="0" max="100" step="5" value="${item?.progress||0}" oninput="document.getElementById('rv').textContent=this.value+'%'"><span class="range-val" id="rv">${item?.progress||0}%</span></div></div><div class="field"><label>Notes / Insight</label><textarea id="f-note" placeholder="What did you learn?">${item?.note||''}</textarea></div>`;}
  else if(type==='articles'){f=`<div class="field"><label>Title</label><input id="f-title" value="${item?.title||''}" placeholder="Article title"></div><div class="field-row"><div class="field"><label>Source</label><input id="f-source" value="${item?.source||''}" placeholder="HBR, WARC..."></div><div class="field"><label>Topic</label><input id="f-topic" value="${item?.topic||''}" placeholder="Topic"></div></div><div class="field"><label>URL</label><input id="f-url" value="${item?.url||''}" placeholder="https://..."></div><div class="field"><label>Status</label><select id="f-status"><option value="queued" ${!item?.status||item?.status==='queued'?'selected':''}>Queued</option><option value="done" ${item?.status==='done'?'selected':''}>Read</option></select></div><div class="field"><label>Notes</label><textarea id="f-note" placeholder="Key takeaway?">${item?.note||''}</textarea></div>`;}
  else if(type==='courses'){f=`<div class="field"><label>Course Title</label><input id="f-title" value="${item?.title||''}" placeholder="Course name"></div><div class="field-row"><div class="field"><label>Platform</label><input id="f-platform" value="${item?.platform||''}" placeholder="HubSpot, CXL..."></div><div class="field"><label>Certificate</label><select id="f-cert"><option value="" ${!item?.cert?'selected':''}>No</option><option value="yes" ${item?.cert?'selected':''}>Yes</option></select></div></div><div class="field"><label>Status</label><select id="f-status"><option value="queued" ${!item?.status||item?.status==='queued'?'selected':''}>Queued</option><option value="progress" ${item?.status==='progress'?'selected':''}>In Progress</option><option value="completed" ${item?.status==='completed'?'selected':''}>Completed</option></select></div><div class="field"><label>Progress</label><div class="range-wrap"><input type="range" id="f-progress" min="0" max="100" step="5" value="${item?.progress||0}" oninput="document.getElementById('rv').textContent=this.value+'%'"><span class="range-val" id="rv">${item?.progress||0}%</span></div></div><div class="field"><label>Notes</label><textarea id="f-note" placeholder="Notes...">${item?.note||''}</textarea></div>`;}
  else if(type==='lang'){f=`<div class="field"><label>Resource Title</label><input id="f-title" value="${item?.title||''}" placeholder="e.g. Marketing School Podcast"></div><div class="field-row"><div class="field"><label>Skill</label><select id="f-skill"><option value="Speaking" ${item?.skill==='Speaking'?'selected':''}>Speaking</option><option value="Listening" ${item?.skill==='Listening'?'selected':''}>Listening</option><option value="Reading" ${item?.skill==='Reading'?'selected':''}>Reading</option><option value="Writing" ${item?.skill==='Writing'?'selected':''}>Writing</option><option value="Vocabulary" ${item?.skill==='Vocabulary'?'selected':''}>Vocabulary</option></select></div><div class="field"><label>Level</label><select id="f-level"><option value="B1" ${item?.level==='B1'?'selected':''}>B1</option><option value="B2" ${item?.level==='B2'||!item?.level?'selected':''}>B2</option><option value="C1" ${item?.level==='C1'?'selected':''}>C1</option></select></div></div><div class="field"><label>URL</label><input id="f-url" value="${item?.url||''}" placeholder="https://..."></div><div class="field"><label>Status</label><select id="f-status"><option value="queued" ${!item?.status||item?.status==='queued'?'selected':''}>Queued</option><option value="active" ${item?.status==='active'?'selected':''}>Active</option><option value="done" ${item?.status==='done'?'selected':''}>Done</option></select></div><div class="field"><label>Notes</label><textarea id="f-note" placeholder="Tips?">${item?.note||''}</textarea></div>`;}
  else if(type==='content'){f=`<div class="field"><label>Title</label><input id="f-title" value="${item?.title||''}" placeholder="Resource title"></div><div class="field-row"><div class="field"><label>Category</label><select id="f-category"><option value="Article" ${item?.category==='Article'?'selected':''}>Article</option><option value="Report" ${item?.category==='Report'?'selected':''}>Report</option><option value="Podcast" ${item?.category==='Podcast'?'selected':''}>Podcast</option><option value="Video" ${item?.category==='Video'?'selected':''}>Video</option><option value="Case Study" ${item?.category==='Case Study'?'selected':''}>Case Study</option></select></div><div class="field"><label>Platform</label><input id="f-platform" value="${item?.platform||''}" placeholder="YouTube..."></div></div><div class="field"><label>URL</label><input id="f-url" value="${item?.url||''}" placeholder="https://..."></div><div class="field"><label>Status</label><select id="f-status"><option value="queued" ${!item?.status||item?.status==='queued'?'selected':''}>Queued</option><option value="done" ${item?.status==='done'?'selected':''}>Read</option></select></div><div class="field"><label>Notes</label><textarea id="f-note" placeholder="Why important?">${item?.note||''}</textarea></div>`;}
  document.getElementById('mfields').innerHTML=f;document.getElementById('overlay').classList.add('open');
}

function closeMod(){document.getElementById('overlay').classList.remove('open');eId=null;eType=null;}

function saveItem(){
  const type=eType;const title=document.getElementById('f-title')?.value?.trim();if(!title)return;
  const base={id:eId||uid(),title};const g=id=>document.getElementById(id)?.value||'';
  if(type==='books')Object.assign(base,{author:g('f-author'),lang:g('f-lang')||'Persian',status:g('f-status')||'queued',progress:parseInt(g('f-progress'))||0,note:g('f-note')});
  else if(type==='articles')Object.assign(base,{source:g('f-source'),topic:g('f-topic'),url:g('f-url'),status:g('f-status')||'queued',note:g('f-note')});
  else if(type==='courses')Object.assign(base,{platform:g('f-platform'),cert:g('f-cert')==='yes',status:g('f-status')||'queued',progress:parseInt(g('f-progress'))||0,note:g('f-note')});
  else if(type==='lang')Object.assign(base,{skill:g('f-skill')||'Listening',level:g('f-level')||'B2',url:g('f-url'),status:g('f-status')||'queued',note:g('f-note')});
  else if(type==='content')Object.assign(base,{category:g('f-category')||'Article',platform:g('f-platform'),url:g('f-url'),status:g('f-status')||'queued',note:g('f-note')});
  if(!data[type])data[type]=[];
  if(eId){const idx=data[type].findIndex(i=>i.id===eId);if(idx!==-1)data[type][idx]=base;}else data[type].push(base);
  save();closeMod();render();toast('Saved ✓');
}

function del(type,id){if(!confirm('Delete?'))return;data[type]=data[type].filter(i=>i.id!==id);save();render();toast('Deleted');}
function ol(url){if(url)window.open(url,'_blank');}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeMod();});

function render(){upd();['books','articles','courses','lang','content'].forEach(t=>rSec(t));if(cur==='brand')rBrand();if(cur==='schedule')rSched();if(cur==='settings')rSet();}
load();
</script>
</body>
</html>
