
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --ink:#1a1a1a;
  --ink2:#6b6b6b;
  --ink3:#a8a8a8;
  --surface:#ffffff;
  --surface2:#f7f6f3;
  --surface3:#efede8;
  --accent:#c8a96e;
  --accent2:#e8d5b0;
  --border:#e2dfd8;
  --green:#2d6a4f;
  --green-bg:#d8f3dc;
  --blue:#1a4e8c;
  --blue-bg:#dbeafe;
  --amber:#92400e;
  --amber-bg:#fef3c7;
  --radius:14px;
  --radius-sm:8px;
}

body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh}

.wrap{max-width:680px;margin:0 auto;padding:2rem 1rem}

.header{margin-bottom:2rem}
.header-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.5rem}
.header-title{font-family:'Instrument Serif',serif;font-size:28px;color:var(--ink);line-height:1.1}
.header-title span{font-style:italic;color:var(--accent)}
.header-date{font-size:12px;color:var(--ink3);letter-spacing:0.05em;text-transform:uppercase}

.overall-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:2rem}
.ostat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;position:relative;overflow:hidden}
.ostat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.ostat.books::before{background:var(--accent)}
.ostat.articles::before{background:#7c9cba}
.ostat.courses::before{background:var(--green)}
.ostat-num{font-family:'Instrument Serif',serif;font-size:32px;color:var(--ink);line-height:1}
.ostat-label{font-size:11px;color:var(--ink3);margin-top:4px;text-transform:uppercase;letter-spacing:0.06em}

.tabs{display:flex;gap:6px;margin-bottom:1.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:5px}
.tab{flex:1;padding:9px 0;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--ink2);border-radius:calc(var(--radius) - 4px);transition:all 0.18s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px}
.tab .tab-count{font-size:11px;background:var(--surface3);color:var(--ink3);border-radius:20px;padding:1px 7px;transition:all 0.18s}
.tab.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.tab.active .tab-count{background:var(--accent2);color:var(--amber)}

.section{display:none}.section.active{display:block}

.add-btn{width:100%;padding:13px;border:1.5px dashed var(--border);border-radius:var(--radius);background:none;color:var(--ink3);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s;margin-bottom:1rem;display:flex;align-items:center;justify-content:center;gap:8px}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(200,169,110,0.04)}
.add-btn .plus{font-size:18px;line-height:1}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:10px;transition:box-shadow 0.15s;position:relative}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.06)}
.card-top{display:flex;align-items:flex-start;gap:12px}
.card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-icon.book-icon{background:#fdf4e3}
.card-icon.art-icon{background:#e8f4fd}
.card-icon.course-icon{background:#e8f5ec}
.card-body{flex:1;min-width:0}
.card-title{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:3px;line-height:1.3}
.card-sub{font-size:13px;color:var(--ink3)}
.card-badge{flex-shrink:0}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;letter-spacing:0.02em}
.b-reading{background:var(--blue-bg);color:var(--blue)}
.b-done{background:var(--green-bg);color:var(--green)}
.b-queued{background:var(--surface3);color:var(--ink3)}
.b-progress{background:var(--amber-bg);color:var(--amber)}

.progress-wrap{margin-top:12px}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-pct{font-size:13px;font-weight:500;color:var(--ink)}
.progress-track{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),#e8b96e);transition:width 0.4s ease}

.card-note{margin-top:10px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);font-size:13px;color:var(--ink2);line-height:1.5;border-left:2px solid var(--accent2)}

.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.card-meta-small{font-size:12px;color:var(--ink3)}
.card-actions{display:flex;gap:6px}
.act-btn{font-size:12px;padding:5px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:none;color:var(--ink2);font-family:'DM Sans',sans-serif;transition:all 0.12s}
.act-btn:hover{background:var(--surface2);color:var(--ink)}
.act-btn.del:hover{border-color:#fca5a5;color:#dc2626;background:#fff5f5}
.act-btn.link-btn{color:var(--blue)}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--ink3)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:0.5}
.empty-text{font-size:14px}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,26,26,0.4);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:1.5rem;width:100%;max-width:580px;max-height:85vh;overflow-y:auto;animation:slideUp 0.22s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.25rem}
.modal-title{font-family:'Instrument Serif',serif;font-size:22px;margin-bottom:1.5rem;color:var(--ink)}

.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--ink2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--ink);font-family:'DM Sans',sans-serif;transition:border-color 0.15s;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{min-height:72px;resize:vertical;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.range-wrap{display:flex;align-items:center;gap:10px}
.range-wrap input[type=range]{flex:1}
.range-val{font-size:14px;font-weight:500;min-width:36px;color:var(--ink)}

.modal-footer{display:flex;gap:8px;margin-top:1.5rem}
.btn-save{flex:1;padding:13px;background:var(--ink);color:white;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.15s}
.btn-save:hover{opacity:0.85}
.btn-cancel{padding:13px 20px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;background:none;color:var(--ink2)}
</style>

<div class="wrap">
  <h2 class="sr-only">مسیر آموزشی محمدرضا اشرفی</h2>
  
  <div class="header">
    <div class="header-top">
      <div class="header-title">مسیر <span>آموزشی</span></div>
      <div class="header-date" id="today-date"></div>
    </div>
    <div class="overall-stats">
      <div class="ostat books">
        <div class="ostat-num" id="stat-books">0</div>
        <div class="ostat-label">کتاب</div>
      </div>
      <div class="ostat articles">
        <div class="ostat-num" id="stat-articles">0</div>
        <div class="ostat-label">مقاله</div>
      </div>
      <div class="ostat courses">
        <div class="ostat-num" id="stat-courses">0</div>
        <div class="ostat-label">دوره</div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('books')">📚 کتاب‌ها <span class="tab-count" id="tc-books">0</span></button>
    <button class="tab" onclick="switchTab('articles')">📄 مقالات <span class="tab-count" id="tc-articles">0</span></button>
    <button class="tab" onclick="switchTab('courses')">🎓 دوره‌ها <span class="tab-count" id="tc-courses">0</span></button>
  </div>

  <div id="books" class="section active"></div>
  <div id="articles" class="section"></div>
  <div id="courses" class="section"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">افزودن کتاب</div>
    <div id="modal-fields"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">انصراف</button>
      <button class="btn-save" onclick="saveItem()">ذخیره</button>
    </div>
  </div>
</div>

<script>
const KEY='mra_learning_v2';
let data={books:[],articles:[],courses:[]};
let currentTab='books';
let editingId=null;
let editingType=null;

const months=['ژانویه','فوریه','مارس','آوریل','مه','ژوئن','ژوئیه','اوت','سپتامبر','اکتبر','نوامبر','دسامبر'];
const d=new Date();
document.getElementById('today-date').textContent=`${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;

async function load(){
  try{const r=await window.storage.get(KEY);if(r&&r.value)data=JSON.parse(r.value);}catch(e){}
  render();
}
async function save(){try{await window.storage.set(KEY,JSON.stringify(data));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['books','articles','courses'][i]===tab);
  });
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
}

function badgeHTML(status){
  const m={reading:['در حال خواندن','b-reading'],done:['تمام شده','b-done'],queued:['در صف','b-queued'],progress:['در حال انجام','b-progress'],completed:['تمام شده','b-done']};
  const [l,c]=m[status]||['—','b-queued'];
  return `<span class="badge ${c}">${l}</span>`;
}

function updateCounts(){
  ['books','articles','courses'].forEach(t=>{
    document.getElementById('tc-'+t).textContent=data[t].length;
    document.getElementById('stat-'+t).textContent=data[t].length;
  });
}

function renderBooks(){
  const items=data.books;
  document.getElementById('books').innerHTML=`
    <button class="add-btn" onclick="openModal('books')"><span class="plus">+</span> افزودن کتاب جدید</button>
    ${items.length===0?`<div class="empty-state"><div class="empty-icon">📚</div><div class="empty-text">هنوز کتابی اضافه نشده</div></div>`:
    items.map(item=>`
      <div class="card">
        <div class="card-top">
          <div class="card-icon book-icon">📖</div>
          <div class="card-body">
            <div class="card-title">${item.title}</div>
            <div class="card-sub">${[item.author,item.lang].filter(Boolean).join(' · ')}</div>
          </div>
          <div class="card-badge">${badgeHTML(item.status)}</div>
        </div>
        ${(item.status==='reading'||item.status==='done')?`
        <div class="progress-wrap">
          <div class="progress-header"><span class="progress-pct">${item.status==='done'?100:item.progress||0}%</span></div>
          <div class="progress-track"><div class="progress-fill" style="width:${item.status==='done'?100:item.progress||0}%"></div></div>
        </div>`:''}
        ${item.note?`<div class="card-note">${item.note}</div>`:''}
        <div class="card-footer">
          <span class="card-meta-small">${item.lang||''}</span>
          <div class="card-actions">
            <button class="act-btn" onclick="openModal('books','${item.id}')">ویرایش</button>
            <button class="act-btn del" onclick="deleteItem('books','${item.id}')">حذف</button>
          </div>
        </div>
      </div>`).join('')}`;
}

function renderArticles(){
  const items=data.articles;
  document.getElementById('articles').innerHTML=`
    <button class="add-btn" onclick="openModal('articles')"><span class="plus">+</span> افزودن مقاله جدید</button>
    ${items.length===0?`<div class="empty-state"><div class="empty-icon">📄</div><div class="empty-text">هنوز مقاله‌ای اضافه نشده</div></div>`:
    items.map(item=>`
      <div class="card">
        <div class="card-top">
          <div class="card-icon art-icon">📝</div>
          <div class="card-body">
            <div class="card-title">${item.title}</div>
            <div class="card-sub">${[item.source,item.topic].filter(Boolean).join(' · ')}</div>
          </div>
          <div class="card-badge">${badgeHTML(item.status)}</div>
        </div>
        ${item.note?`<div class="card-note">${item.note}</div>`:''}
        <div class="card-footer">
          <span class="card-meta-small">${item.source||''}</span>
          <div class="card-actions">
            ${item.url?`<button class="act-btn link-btn" onclick="openLink('${item.url}')">باز کردن ↗</button>`:''}
            <button class="act-btn" onclick="openModal('articles','${item.id}')">ویرایش</button>
            <button class="act-btn del" onclick="deleteItem('articles','${item.id}')">حذف</button>
          </div>
        </div>
      </div>`).join('')}`;
}

function renderCourses(){
  const items=data.courses;
  document.getElementById('courses').innerHTML=`
    <button class="add-btn" onclick="openModal('courses')"><span class="plus">+</span> افزودن دوره جدید</button>
    ${items.length===0?`<div class="empty-state"><div class="empty-icon">🎓</div><div class="empty-text">هنوز دوره‌ای اضافه نشده</div></div>`:
    items.map(item=>`
      <div class="card">
        <div class="card-top">
          <div class="card-icon course-icon">🎯</div>
          <div class="card-body">
            <div class="card-title">${item.title}</div>
            <div class="card-sub">${[item.platform,item.cert?'دارای مدرک':null].filter(Boolean).join(' · ')}</div>
          </div>
          <div class="card-badge">${badgeHTML(item.status)}</div>
        </div>
        ${item.status==='progress'?`
        <div class="progress-wrap">
          <div class="progress-header"><span class="progress-pct">${item.progress||0}%</span></div>
          <div class="progress-track"><div class="progress-fill" style="width:${item.progress||0}%"></div></div>
        </div>`:''}
        ${item.note?`<div class="card-note">${item.note}</div>`:''}
        <div class="card-footer">
          <span class="card-meta-small">${item.platform||''}</span>
          <div class="card-actions">
            <button class="act-btn" onclick="openModal('courses','${item.id}')">ویرایش</button>
            <button class="act-btn del" onclick="deleteItem('courses','${item.id}')">حذف</button>
          </div>
        </div>
      </div>`).join('')}`;
}

function render(){
  updateCounts();
  renderBooks();
  renderArticles();
  renderCourses();
}

function openModal(type,id){
  editingId=id||null;
  editingType=type;
  const item=id?data[type].find(i=>i.id===id):null;
  const titles={books:'کتاب',articles:'مقاله',courses:'دوره'};
  document.getElementById('modal-title').textContent=(id?'ویرایش ':'افزودن ')+titles[type];

  let f='';
  if(type==='books'){
    f=`
      <div class="field"><label>عنوان کتاب</label><input id="f-title" value="${item?.title||''}" placeholder="نام کتاب را وارد کنید"></div>
      <div class="field-row">
        <div class="field"><label>نویسنده</label><input id="f-author" value="${item?.author||''}" placeholder="نویسنده"></div>
        <div class="field"><label>زبان</label><select id="f-lang"><option value="فارسی" ${item?.lang==='فارسی'||!item?.lang?'selected':''}>فارسی</option><option value="انگلیسی" ${item?.lang==='انگلیسی'?'selected':''}>انگلیسی</option></select></div>
      </div>
      <div class="field"><label>وضعیت</label><select id="f-status">
        <option value="queued" ${item?.status==='queued'||!item?.status?'selected':''}>در صف خواندن</option>
        <option value="reading" ${item?.status==='reading'?'selected':''}>در حال خواندن</option>
        <option value="done" ${item?.status==='done'?'selected':''}>تمام شده</option>
      </select></div>
      <div class="field"><label>پیشرفت</label><div class="range-wrap"><input type="range" id="f-progress" min="0" max="100" step="5" value="${item?.progress||0}" oninput="document.getElementById('pv').textContent=this.value+'%'"><span class="range-val" id="pv">${item?.progress||0}%</span></div></div>
      <div class="field"><label>یادداشت / Insight</label><textarea id="f-note" placeholder="چه چیزی یاد گرفتی؟">${item?.note||''}</textarea></div>`;
  } else if(type==='articles'){
    f=`
      <div class="field"><label>عنوان مقاله</label><input id="f-title" value="${item?.title||''}" placeholder="عنوان مقاله"></div>
      <div class="field-row">
        <div class="field"><label>منبع</label><input id="f-source" value="${item?.source||''}" placeholder="مثلاً HBR"></div>
        <div class="field"><label>موضوع</label><input id="f-topic" value="${item?.topic||''}" placeholder="موضوع"></div>
      </div>
      <div class="field"><label>لینک</label><input id="f-url" value="${item?.url||''}" placeholder="https://..."></div>
      <div class="field"><label>وضعیت</label><select id="f-status">
        <option value="queued" ${item?.status==='queued'||!item?.status?'selected':''}>در صف خواندن</option>
        <option value="done" ${item?.status==='done'?'selected':''}>خوانده شده</option>
      </select></div>
      <div class="field"><label>یادداشت / Insight</label><textarea id="f-note" placeholder="نکته مهم این مقاله؟">${item?.note||''}</textarea></div>`;
  } else {
    f=`
      <div class="field"><label>نام دوره</label><input id="f-title" value="${item?.title||''}" placeholder="نام دوره"></div>
      <div class="field-row">
        <div class="field"><label>پلتفرم</label><input id="f-platform" value="${item?.platform||''}" placeholder="Google, Coursera..."></div>
        <div class="field"><label>مدرک</label><select id="f-cert"><option value="" ${!item?.cert?'selected':''}>بدون مدرک</option><option value="yes" ${item?.cert?'selected':''}>دارای مدرک</option></select></div>
      </div>
      <div class="field"><label>وضعیت</label><select id="f-status">
        <option value="queued" ${item?.status==='queued'||!item?.status?'selected':''}>در صف</option>
        <option value="progress" ${item?.status==='progress'?'selected':''}>در حال انجام</option>
        <option value="completed" ${item?.status==='completed'?'selected':''}>تمام شده</option>
      </select></div>
      <div class="field"><label>پیشرفت</label><div class="range-wrap"><input type="range" id="f-progress" min="0" max="100" step="5" value="${item?.progress||0}" oninput="document.getElementById('pv2').textContent=this.value+'%'"><span class="range-val" id="pv2">${item?.progress||0}%</span></div></div>
      <div class="field"><label>یادداشت</label><textarea id="f-note" placeholder="نکات این دوره...">${item?.note||''}</textarea></div>`;
  }

  document.getElementById('modal-fields').innerHTML=f;
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  editingId=null;editingType=null;
}

function saveItem(){
  const type=editingType;
  const title=document.getElementById('f-title')?.value?.trim();
  if(!title)return;
  const base={id:editingId||uid(),title};

  if(type==='books'){
    Object.assign(base,{author:document.getElementById('f-author')?.value||'',lang:document.getElementById('f-lang')?.value||'فارسی',status:document.getElementById('f-status')?.value||'queued',progress:parseInt(document.getElementById('f-progress')?.value)||0,note:document.getElementById('f-note')?.value||''});
  } else if(type==='articles'){
    Object.assign(base,{source:document.getElementById('f-source')?.value||'',topic:document.getElementById('f-topic')?.value||'',url:document.getElementById('f-url')?.value||'',status:document.getElementById('f-status')?.value||'queued',note:document.getElementById('f-note')?.value||''});
  } else {
    Object.assign(base,{platform:document.getElementById('f-platform')?.value||'',cert:document.getElementById('f-cert')?.value==='yes',status:document.getElementById('f-status')?.value||'queued',progress:parseInt(document.getElementById('f-progress')?.value)||0,note:document.getElementById('f-note')?.value||''});
  }

  if(editingId){const idx=data[type].findIndex(i=>i.id===editingId);if(idx!==-1)data[type][idx]=base;}
  else data[type].push(base);

  save();closeModal();render();
}

function deleteItem(type,id){
  data[type]=data[type].filter(i=>i.id!==id);
  save();render();
}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

load();
</script>
